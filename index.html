<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCF Planning — Terminales CAP</title>
<style>
:root {
  --primary: #4361ee;
  --primary-light: #e8ecff;
  --success: #2ec4b6;
  --warning: #ff9f1c;
  --danger: #e63946;
  --gray-50: #f8f9fa;
  --gray-100: #f1f3f5;
  --gray-200: #e9ecef;
  --gray-300: #dee2e6;
  --gray-400: #ced4da;
  --gray-500: #adb5bd;
  --gray-600: #868e96;
  --gray-700: #495057;
  --gray-800: #343a40;
  --gray-900: #212529;
  --radius: 10px;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--gray-50);
  color: var(--gray-900);
  min-height: 100vh;
}

/* === HEADER === */
.header {
  background: linear-gradient(135deg, var(--primary), #3a0ca3);
  color: white;
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-lg);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}

.header h1 {
  font-size: 1.3rem;
  font-weight: 700;
}

.header-sub {
  font-size: 0.85rem;
  opacity: 0.9;
  margin-top: 2px;
}

/* === FILTRES === */
.filters {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.filters select, .filters input {
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  font-size: 0.85rem;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
}

.filters select option { color: var(--gray-900); background: white; }

.filters input[type="text"] {
  background: rgba(255,255,255,0.2);
  color: white;
  width: 140px;
}

.filters input::placeholder { color: rgba(255,255,255,0.6); }

/* === NAVIGATION SEMAINE === */
.week-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 14px 20px;
  background: white;
  border-bottom: 1px solid var(--gray-200);
  position: sticky;
  top: 62px;
  z-index: 90;
}

.week-nav button {
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 600;
  transition: 0.2s;
}

.week-nav button:hover { opacity: 0.85; }
.week-nav button:disabled { opacity: 0.4; cursor: not-allowed; }

.week-label {
  font-weight: 700;
  font-size: 1rem;
  text-align: center;
  min-width: 260px;
}

.week-type {
  display: inline-block;
  background: var(--primary);
  color: white;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 0.75rem;
  margin-left: 6px;
  vertical-align: middle;
}

/* === GRILLE EMPLOI DU TEMPS === */
.schedule-container {
  padding: 16px;
  overflow-x: auto;
}

.schedule-grid {
  display: grid;
  grid-template-columns: 70px repeat(5, 1fr);
  gap: 2px;
  min-width: 700px;
}

.grid-header {
  background: var(--gray-800);
  color: white;
  padding: 10px 6px;
  text-align: center;
  font-weight: 700;
  font-size: 0.8rem;
  border-radius: 6px 6px 0 0;
}

.grid-header.time-col {
  background: var(--gray-700);
  font-size: 0.7rem;
}

.time-slot {
  background: var(--gray-100);
  padding: 4px 6px;
  font-size: 0.65rem;
  color: var(--gray-600);
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  border-right: 2px solid var(--gray-300);
}

.slot {
  min-height: 44px;
  padding: 4px;
  position: relative;
  border: 1px solid var(--gray-200);
  background: white;
}

.slot-empty {
  background: var(--gray-50);
}

.slot-course {
  background: white;
  cursor: pointer;
  transition: 0.15s;
}

.slot-course:hover {
  box-shadow: inset 0 0 0 2px var(--primary);
}

.slot-ccf-own {
  background: #d4edda;
  border-color: #28a745;
}

.slot-ccf-other {
  background: #fff3cd;
  border-color: #ffc107;
}

.slot-ccf-pending {
  background: #ffeaa7;
  border-color: var(--warning);
  animation: pulse-border 2s infinite;
}

@keyframes pulse-border {
  0%, 100% { border-color: var(--warning); }
  50% { border-color: #e17055; }
}

.slot-unavailable {
  background: #f8d7da;
  border-color: var(--danger);
}

.slot-pfmp {
  background: #e2e3e5;
  color: var(--gray-600);
  font-style: italic;
}

.slot-content {
  font-size: 0.7rem;
  line-height: 1.3;
}

.slot-subject {
  font-weight: 700;
  color: var(--gray-800);
  margin-bottom: 1px;
}

.slot-teacher {
  color: var(--gray-600);
  font-size: 0.65rem;
}

.slot-room {
  color: var(--gray-500);
  font-size: 0.6rem;
}

.slot-badge {
  position: absolute;
  top: 2px;
  right: 2px;
  font-size: 0.55rem;
  padding: 1px 5px;
  border-radius: 8px;
  font-weight: 700;
  color: white;
}

.badge-ccf { background: #28a745; }
.badge-pending { background: var(--warning); }
.badge-unavail { background: var(--danger); }

/* === LEGENDE === */
.legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  padding: 10px 20px;
  background: white;
  border-top: 1px solid var(--gray-200);
  font-size: 0.75rem;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.legend-dot {
  width: 14px;
  height: 14px;
  border-radius: 3px;
  border: 1px solid var(--gray-300);
}

/* === MODAL === */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.modal-overlay.active {
  display: flex;
}

.modal {
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  max-width: 480px;
  width: 100%;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  animation: slideUp 0.2s ease;
}

.modal-body {
  overflow-y: auto;
  flex: 1;
  padding: 20px;
}

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-header h3 { font-size: 1rem; }

.modal-close {
  background: none;
  border: none;
  font-size: 1.3rem;
  cursor: pointer;
  color: var(--gray-500);
  padding: 4px;
}

.modal-body .info-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid var(--gray-100);
  font-size: 0.85rem;
}

.info-row .label { color: var(--gray-600); }
.info-row .value { font-weight: 600; }

/* === FORMULAIRE === */
.form-group {
  margin-bottom: 14px;
}

.form-group label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--gray-700);
  margin-bottom: 4px;
}

.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--gray-300);
  border-radius: 6px;
  font-size: 0.85rem;
  font-family: inherit;
}

.form-group input:focus,
.form-group select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 2px var(--primary-light);
}

.form-actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
}

.btn {
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
  flex: 1;
}

.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { opacity: 0.85; }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { opacity: 0.85; }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { opacity: 0.85; }
.btn-outline {
  background: white;
  color: var(--gray-700);
  border: 1px solid var(--gray-300);
}

.btn-outline:hover { background: var(--gray-100); }

/* === DEMANDES EN ATTENTE === */
.pending-bar {
  background: #fff8e1;
  border-bottom: 1px solid #ffe082;
  padding: 10px 20px;
  font-size: 0.8rem;
  display: none;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}

.pending-bar.visible { display: flex; }

.pending-count {
  background: var(--warning);
  color: white;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.7rem;
}

/* === CLASSES TABS === */
.class-tabs {
  display: flex;
  gap: 4px;
  padding: 10px 20px;
  background: white;
  border-bottom: 1px solid var(--gray-200);
  overflow-x: auto;
  flex-wrap: nowrap;
}

.class-tab {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  border: 2px solid var(--gray-300);
  background: white;
  white-space: nowrap;
  transition: 0.2s;
}

.class-tab:hover { border-color: var(--primary); }

.class-tab.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}

.class-tab.tab-all {
  background: var(--gray-100);
}

.class-tab.tab-all.active {
  background: var(--gray-800);
  color: white;
  border-color: var(--gray-800);
}

/* === NOTIFICATIONS TOAST === */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--gray-800);
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 0.85rem;
  box-shadow: var(--shadow-lg);
  z-index: 300;
  transform: translateY(100px);
  opacity: 0;
  transition: 0.3s;
}

.toast.show {
  transform: translateY(0);
  opacity: 1;
}

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .header { padding: 12px 14px; }
  .header h1 { font-size: 1.1rem; }
  .header-top { flex-direction: column; align-items: flex-start; }
  .filters { width: 100%; }
  .filters select, .filters input { flex: 1; min-width: 0; }
  .week-nav { padding: 10px 14px; top: 105px; }
  .week-label { min-width: auto; font-size: 0.85rem; }
  .schedule-container { padding: 8px; }
  .schedule-grid { min-width: 600px; grid-template-columns: 55px repeat(5, 1fr); }
  .class-tabs { padding: 8px 14px; }
  .modal { max-width: 100%; margin: 0; border-radius: 12px 12px 0 0; }
}

/* === DEMANDES PANEL === */
.requests-panel {
  padding: 16px 20px;
  display: none;
}

.requests-panel.visible { display: block; }

.request-card {
  background: white;
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--warning);
}

.request-card.accepted { border-left-color: var(--success); }
.request-card.refused { border-left-color: var(--danger); }

.request-info {
  font-size: 0.8rem;
  color: var(--gray-700);
  margin-bottom: 8px;
}

.request-info strong { color: var(--gray-900); }

.request-actions {
  display: flex;
  gap: 6px;
}

.request-actions .btn {
  padding: 6px 12px;
  font-size: 0.75rem;
  flex: 0;
}

/* === LOADING === */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--gray-500);
}

.spinner {
  width: 30px;
  height: 30px;
  border: 3px solid var(--gray-200);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 10px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* checkbox classes dans le formulaire */
.checkbox-group {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.checkbox-group label {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.8rem;
  font-weight: 500;
  padding: 4px 10px;
  border: 1px solid var(--gray-300);
  border-radius: 20px;
  cursor: pointer;
  transition: 0.2s;
}

.checkbox-group label:has(input:checked) {
  background: var(--primary-light);
  border-color: var(--primary);
}

.checkbox-group input { display: none; }

.slot-highlight {
  box-shadow: inset 0 0 0 3px var(--primary) !important;
  background: var(--primary-light) !important;
}

.slot-dimmed {
  opacity: 0.45;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <h1>CCF Planning</h1>
      <div class="header-sub">Terminales CAP — Mars / Juin 2026</div>
    </div>
    <div class="filters">
    </div>
  </div>
</div>

<!-- ONGLETS CLASSES -->
<div class="class-tabs" id="classTabs">
  <button class="class-tab tab-all active" data-class="all">Vue globale</button>
</div>

<!-- BARRE DEMANDES -->
<div class="pending-bar" id="pendingBar" onclick="showRequests()">
  <div class="pending-count" id="pendingCount">0</div>
  <span>Demande(s) CCF en attente — Cliquez pour voir</span>
</div>

<!-- NAVIGATION SEMAINE -->
<div class="week-nav">
  <button onclick="changeWeek(-1)" id="btnPrev">Sem. prec.</button>
  <div class="week-label" id="weekLabel"></div>
  <button onclick="changeWeek(1)" id="btnNext">Sem. suiv.</button>
</div>

<!-- LEGENDE -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:white;border-color:var(--gray-300)"></div> Cours normal</div>
  <div class="legend-item"><div class="legend-dot" style="background:#d4edda;border-color:#28a745"></div> Mon CCF</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fff3cd;border-color:#ffc107"></div> CCF autre enseignant</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffeaa7;border-color:#e17055"></div> Demande en attente</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f8d7da;border-color:#e63946"></div> Indisponible</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e2e3e5"></div> PFMP / Vacances</div>
</div>

<!-- CONTENU PRINCIPAL -->
<div id="mainContent">
  <div class="loading" id="loadingIndicator">
    <div class="spinner"></div>
    Chargement...
  </div>
  <div class="schedule-container" id="scheduleContainer" style="display:none"></div>
  <div class="requests-panel" id="requestsPanel"></div>
</div>

<!-- MODAL DETAIL CRENEAU -->
<div class="modal-overlay" id="modalSlot">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Detaille du creneau</h3>
      <button class="modal-close" onclick="closeModal('modalSlot')">&times;</button>
    </div>
    <div class="modal-body" id="modalSlotBody"></div>
  </div>
</div>

<!-- MODAL FORMULAIRE CCF -->
<div class="modal-overlay" id="modalCCF">
  <div class="modal">
    <div class="modal-header">
      <h3>Poser un CCF</h3>
      <button class="modal-close" onclick="closeModal('modalCCF')">&times;</button>
    </div>
    <div class="modal-body">
      <form id="ccfForm" onsubmit="submitCCF(event)">
        <input type="hidden" id="ccfSlotKey">
        <input type="hidden" id="ccfDate">
        <input type="hidden" id="ccfClassId">
        <input type="hidden" id="ccfSlotStart">
        <input type="hidden" id="ccfDayIdx">

        <div class="form-group">
          <label>👨‍🏫 Votre nom</label>
          <input type="text" id="ccfTeacher" required placeholder="Entrez votre nom...">
        </div>

        <div class="form-group">
          <label>Matiere du CCF</label>
          <input type="text" id="ccfSubject" required placeholder="Ex: PSE, Francais, Maths...">
        </div>

        <div class="form-group">
          <label>Classe(s) concernee(s)</label>
          <div class="checkbox-group" id="ccfClasses"></div>
        </div>

        <div class="form-group">
          <label>Duree</label>
          <select id="ccfDuration" required>
            <option value="1">1h</option>
            <option value="1.5">1h30</option>
            <option value="2">2h</option>
            <option value="2.5">2h30</option>
            <option value="3">3h</option>
            <option value="3.5">3h30</option>
            <option value="4">4h</option>
          </select>
        </div>

        <div class="form-group">
          <label>Nombre d'eleves</label>
          <input type="number" id="ccfStudents" required min="1" max="40" placeholder="Ex: 12">
        </div>

        <div class="form-group">
          <label>Nombre d'AESH necessaires</label>
          <input type="number" id="ccfAesh" value="0" min="0" max="10">
        </div>

        <div class="form-group" id="ccfImpactGroup" style="display:none">
          <label>Creneaux impactes</label>
          <div id="ccfImpactPreview" style="background:var(--gray-100);border-radius:6px;padding:10px;font-size:0.8rem;line-height:1.6"></div>
        </div>

        <div class="form-group">
          <label>Commentaire (optionnel)</label>
          <textarea id="ccfComment" rows="2" placeholder="Information complementaire..."></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-outline" onclick="closeModal('modalCCF')">Annuler</button>
          <button type="submit" class="btn btn-primary">Envoyer la demande</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

// === EXTRAIRE TOUS LES ENSEIGNANTS ===
function getAllTeachers() {
  const set = new Set();
  Object.values(SCHEDULES).forEach(slots => {
    slots.forEach(s => s.teachers.forEach(t => set.add(t)));
  });
  return [...set].sort();
}

// === UTILITAIRES DATE ===
function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = date.getDate() - day + (day === 0 ? -6 : 1);
  date.setDate(diff);
  date.setHours(0,0,0,0);
  return date;
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function formatDate(d) {
  return d.toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
}

function formatDateISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function getWeekType(monday) {
  const diffWeeks = Math.round((monday - SEMAINE_A_REF) / (7*24*60*60*1000));
  return diffWeeks % 2 === 0 ? 'A' : 'B';
}

function isVacances(date) {
  const iso = formatDateISO(date);
  return iso >= VACANCES.start && iso <= VACANCES.end;
}

function isFerie(date) {
  return FERIES.includes(formatDateISO(date));
}

function isPFMP(classId, date) {
  const iso = formatDateISO(date);
  return PFMP.some(p => (p.classId === classId) && iso >= p.start && iso <= p.end);
}

// === HEURES EN MINUTES ===
function timeToMin(t) {
  const [h, m] = t.replace('h',':').split(':').map(Number);
  return h * 60 + (m || 0);
}

// === CRENEAUX HORAIRES ===
const TIME_SLOTS = [];
for (let h = 8; h <= 17; h++) {
  for (let m = 0; m < 60; m += 30) {
    if (h === 17 && m > 0) break;
    const start = `${h}h${m === 0 ? '00' : m}`;
    const endH = m === 30 ? h + 1 : h;
    const endM = m === 30 ? 0 : 30;
    const end = `${endH}h${endM === 0 ? '00' : endM}`;
    TIME_SLOTS.push({ start, end, startMin: h*60+m, endMin: endH*60+endM });
  }
}

const MIN_DATE = new Date(2026, 2, 16);

// === INIT ===
function init() {
  // Onglets classes
  const tabsEl = document.getElementById('classTabs');
  Object.entries(CLASSES).forEach(([id, c]) => {
    const btn = document.createElement('button');
    btn.className = 'class-tab';
    btn.dataset.class = id;
    btn.textContent = `${id}`;
    btn.style.borderColor = c.color;
    btn.onclick = () => selectClass(id);
    tabsEl.appendChild(btn);
  });

  // Formulaire: classes checkboxes
  const ccfClassesDiv = document.getElementById('ccfClasses');
  Object.entries(CLASSES).forEach(([id, c]) => {
    const lbl = document.createElement('label');
    lbl.innerHTML = `<input type="checkbox" name="ccfClass" value="${id}"> ${id}`;
    ccfClassesDiv.appendChild(lbl);
  });

  // Listener pour apercu dynamique des creneaux impactes
  document.getElementById('ccfDuration').addEventListener('change', updateImpactPreview);

  // Ecouter Firebase
  ccfRef.on('value', snap => {
    ccfData = snap.val() || {};
    updatePendingCount();
    render();
  });

  render();
}

function selectClass(classId) {
  currentClass = classId;
  document.querySelectorAll('.class-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.class === classId);
  });
  document.getElementById('requestsPanel').classList.remove('visible');
  render();
}

document.querySelector('.class-tab.tab-all').onclick = () => {
  currentClass = 'all';
  document.querySelectorAll('.class-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.class === 'all');
  });
  render();
};

function changeWeek(delta) {
  currentMonday = addDays(currentMonday, delta * 7);
  if (currentMonday < MIN_DATE) currentMonday = getMonday(MIN_DATE);
  if (currentMonday > MAX_DATE) currentMonday = getMonday(MAX_DATE);
  render();
}

// === RENDU PRINCIPAL ===
function render() {
  const weekType = getWeekType(currentMonday);
  const friday = addDays(currentMonday, 4);

  // Label semaine
  document.getElementById('weekLabel').innerHTML =
    `${formatDate(currentMonday)} — ${formatDate(friday)} <span class="week-type">Semaine ${weekType}</span>`;

  // Boutons nav
  document.getElementById('btnPrev').disabled = currentMonday <= MIN_DATE;
  document.getElementById('btnNext').disabled = currentMonday >= MAX_DATE;

  const container = document.getElementById('scheduleContainer');
  container.style.display = 'block';
  document.getElementById('loadingIndicator').style.display = 'none';

  // Determiner les classes a afficher
  const classesToShow = currentClass === 'all' ? Object.keys(CLASSES) : [currentClass];

  let html = '';

  classesToShow.forEach(classId => {
    const cls = CLASSES[classId];
    html += `<h2 style="margin:20px 0 8px;font-size:1rem;color:${cls.color}">${classId} — ${cls.label}</h2>`;
    html += renderClassWeek(classId, weekType);
  });

  container.innerHTML = html;
}

function renderClassWeek(classId, weekType) {
  // Verifier si toute la semaine est en PFMP, vacances ou ferie
  let allDaysOff = true;
  for (let d = 0; d < 5; d++) {
    const date = addDays(currentMonday, d);
    if (!isVacances(date) && !isFerie(date) && !isPFMP(classId, date)) {
      allDaysOff = false;
      break;
    }
  }

  if (allDaysOff) {
    // Verifier le type : PFMP ou vacances
    const firstDay = addDays(currentMonday, 0);
    if (isPFMP(classId, firstDay)) {
      const pfmp = PFMP.find(p => (p.classId === classId) && formatDateISO(firstDay) >= p.start && formatDateISO(firstDay) <= p.end);
      const endDate = pfmp ? new Date(pfmp.end + 'T00:00:00') : null;
      return `<div style="background:#e2e3e5;padding:20px;border-radius:8px;text-align:center;color:var(--gray-600);font-size:0.9rem;">
        <strong>PFMP — Stage en entreprise</strong><br>
        ${endDate ? 'Jusqu\'au ' + formatDate(endDate) : ''}
      </div>`;
    }
    return `<div style="background:#e2e3e5;padding:20px;border-radius:8px;text-align:center;color:var(--gray-600);font-size:0.9rem;">
      <strong>Vacances scolaires</strong>
    </div>`;
  }

  let html = '<div class="schedule-grid">';

  // En-tetes
  html += '<div class="grid-header time-col">Horaire</div>';
  for (let d = 0; d < 5; d++) {
    const date = addDays(currentMonday, d);
    const dayLabel = DAYS[d] + ' ' + date.getDate() + '/' + (date.getMonth()+1);
    html += `<div class="grid-header">${dayLabel}</div>`;
  }

  // Trouver les creneaux pour cette classe et ce type de semaine
  const schedule = SCHEDULES[classId] || [];
  const relevant = schedule.filter(s => s.week === 'AB' || s.week === weekType);

  // Creneaux horaires: trouver min/max
  let minTime = 510, maxTime = 1020; // 8h30 - 17h00
  relevant.forEach(s => {
    const st = timeToMin(s.start);
    const et = timeToMin(s.end);
    if (st < minTime) minTime = st;
    if (et > maxTime) maxTime = et;
  });

  // Arrondir a la demi-heure
  minTime = Math.floor(minTime / 30) * 30;
  maxTime = Math.ceil(maxTime / 30) * 30;

  const slots = [];
  for (let t = minTime; t < maxTime; t += 30) {
    slots.push(t);
  }

  // Generer la grille
  slots.forEach(slotMin => {
    const h = Math.floor(slotMin / 60);
    const m = slotMin % 60;
    const timeLabel = `${h}h${m === 0 ? '00' : m}`;

    html += `<div class="time-slot">${timeLabel}</div>`;

    for (let d = 0; d < 5; d++) {
      const date = addDays(currentMonday, d);
      const dateISO = formatDateISO(date);

      // Vacances ou ferie ?
      if (isVacances(date) || isFerie(date)) {
        html += `<div class="slot slot-pfmp"><div class="slot-content"><div class="slot-subject">${isFerie(date) ? 'Jour ferie' : 'Vacances'}</div></div></div>`;
        continue;
      }

      // PFMP ?
      if (isPFMP(classId, date)) {
        html += `<div class="slot slot-pfmp"><div class="slot-content"><div class="slot-subject">PFMP - Stage</div></div></div>`;
        continue;
      }

      // Trouver le cours sur ce creneau
      const course = relevant.find(s => {
        const sMin = timeToMin(s.start);
        const eMin = timeToMin(s.end);
        return s.day === d && slotMin >= sMin && slotMin < eMin;
      });

      if (!course) {
        html += `<div class="slot slot-empty"></div>`;
        continue;
      }

      // Verifier s'il y a un CCF sur ce creneau
      const slotKey = `${classId}_${dateISO}_${course.start}_${course.end}`;
      const ccfEntry = findCCF(classId, dateISO, slotMin);

      // Premiere demi-heure du cours = afficher le detail
      const isFirst = slotMin === timeToMin(course.start);

      if (!isFirst) {
        // Continuation du cours
        const cssClass = ccfEntry ? getCCFClass(ccfEntry) : 'slot-course';
        html += `<div class="slot ${cssClass}" onclick="openSlot('${classId}','${dateISO}','${course.start}','${course.end}',${d})"></div>`;
        continue;
      }

      // Premiere demi-heure: afficher le contenu
      const cssClass = ccfEntry ? getCCFClass(ccfEntry) : 'slot-course';
      let badge = '';
      let ccfOverlay = '';
      if (ccfEntry) {
        const ccfStart = ccfEntry.ccfStart || ccfEntry.slotStart;
        const ccfEnd = ccfEntry.ccfEnd || ccfEntry.slotEnd;
        const isFirstCCFSlot = slotMin === timeToMin(ccfStart);

        if (ccfEntry.status === 'accepted' || ccfEntry.status === 'own') {
          badge = `<div class="slot-badge badge-ccf">CCF</div>`;
        } else if (ccfEntry.status === 'pending') {
          badge = `<div class="slot-badge badge-pending">En attente</div>`;
        }

        // Afficher les infos CCF sur le premier creneau impacte
        if (isFirstCCFSlot) {
          ccfOverlay = `<div style="font-size:0.65rem;color:var(--primary);font-weight:600;margin-top:2px">📝 CCF ${ccfEntry.subject}<br>${ccfStart}-${ccfEnd}</div>`;
        }
      }

      html += `<div class="slot ${cssClass}" onclick="openSlot('${classId}','${dateISO}','${course.start}','${course.end}',${d})">
        ${badge}
        <div class="slot-content">
          <div class="slot-subject">${course.subject}</div>
          <div class="slot-room">${course.room}</div>
          ${ccfOverlay}
        </div>
      </div>`;
    }
  });

  html += '</div>';
  return html;
}

function getCCFClass(ccf) {
  if (ccf.status === 'own') return 'slot-ccf-own';
  if (ccf.status === 'accepted') return 'slot-ccf-other';
  if (ccf.status === 'pending') return 'slot-ccf-pending';
  if (ccf.status === 'refused') return 'slot-course';
  return 'slot-course';
}

function findCCF(classId, dateISO, slotMin) {
  for (const [key, val] of Object.entries(ccfData)) {
    if (val.date === dateISO && val.status !== 'refused') {
      // Verifier si cette classe est concernee (classId direct OU dans le tableau classes)
      const classMatch = val.classId === classId || (val.classes && val.classes.includes(classId));
      if (!classMatch) continue;
      // Support nouveau format (ccfStart/ccfEnd) et ancien (slotStart/slotEnd)
      const ccfStart = timeToMin(val.ccfStart || val.slotStart);
      const ccfEnd = timeToMin(val.ccfEnd || val.slotEnd);
      if (slotMin >= ccfStart && slotMin < ccfEnd) return { ...val, key };
    }
  }
  return null;
}

// Trouver les cours impactes par un CCF de duree donnee
function getImpactedSlots(classId, dateISO, startTime, durationH) {
  const weekType = getWeekType(getMonday(new Date(dateISO + 'T00:00:00')));
  const schedule = SCHEDULES[classId] || [];
  const dayIdx = new Date(dateISO + 'T00:00:00').getDay();
  // Convertir: 0=dimanche -> notre format 0=lundi
  const day = dayIdx === 0 ? 6 : dayIdx - 1;

  const ccfStartMin = timeToMin(startTime);
  const ccfEndMin = ccfStartMin + durationH * 60;

  const impacted = [];
  const seen = new Set();

  schedule.filter(s => s.day === day && (s.week === 'AB' || s.week === weekType)).forEach(s => {
    const sMin = timeToMin(s.start);
    const eMin = timeToMin(s.end);
    // Le cours chevauche la plage CCF ?
    if (sMin < ccfEndMin && eMin > ccfStartMin) {
      const key = `${s.start}_${s.end}_${s.subject}`;
      if (!seen.has(key)) {
        seen.add(key);
        impacted.push({
          start: s.start,
          end: s.end,
          subject: s.subject,
          teachers: s.teachers,
          room: s.room,
          approval: 'pending'
        });
      }
    }
  });

  return impacted;
}

// Calculer heure de fin a partir de start + duree
function calcEndTime(startTime, durationH) {
  const startMin = timeToMin(startTime);
  const endMin = startMin + durationH * 60;
  const h = Math.floor(endMin / 60);
  const m = endMin % 60;
  return `${h}h${m === 0 ? '00' : m < 10 ? '0' + m : m}`;
}

// === MODAL DETAIL ===
function openSlot(classId, dateISO, start, end, dayIdx) {
  const weekType = getWeekType(currentMonday);
  const schedule = SCHEDULES[classId] || [];
  const course = schedule.find(s =>
    s.day === dayIdx && s.start === start && s.end === end &&
    (s.week === 'AB' || s.week === weekType)
  );

  if (!course) return;

  const date = new Date(dateISO + 'T00:00:00');
  const ccfEntry = findCCFForSlot(classId, dateISO, start, end);

  let body = `
    <div class="info-row"><span class="label">Classe</span><span class="value">${classId}</span></div>
    <div class="info-row"><span class="label">Date</span><span class="value">${DAYS[dayIdx]} ${formatDate(date)}</span></div>
    <div class="info-row"><span class="label">Horaire</span><span class="value">${start} — ${end}</span></div>
    <div class="info-row"><span class="label">Matiere</span><span class="value">${course.subject}</span></div>
    <div class="info-row"><span class="label">Salle</span><span class="value">${course.room}</span></div>
  `;

  if (ccfEntry) {
    const ccfStart = ccfEntry.ccfStart || ccfEntry.slotStart;
    const ccfEnd = ccfEntry.ccfEnd || ccfEntry.slotEnd;

    body += `<hr style="margin:12px 0;border:none;border-top:1px solid var(--gray-200)">`;
    body += `<div class="info-row"><span class="label">CCF</span><span class="value" style="color:#28a745;font-weight:700">${ccfEntry.subject}</span></div>`;
    body += `<div class="info-row"><span class="label">Demandeur</span><span class="value">${ccfEntry.requestedBy}</span></div>`;
    body += `<div class="info-row"><span class="label">Horaire CCF</span><span class="value">${ccfStart} — ${ccfEnd} (${ccfEntry.duration}h)</span></div>`;
    body += `<div class="info-row"><span class="label">Classes CCF</span><span class="value">${(ccfEntry.classes || []).join(', ')}</span></div>`;
    body += `<div class="info-row"><span class="label">Eleves</span><span class="value">${ccfEntry.students}</span></div>`;
    body += `<div class="info-row"><span class="label">AESH</span><span class="value">${ccfEntry.aesh || 0}</span></div>`;

    // Afficher les creneaux impactes avec statut de validation
    if (ccfEntry.impactedSlots && ccfEntry.impactedSlots.length > 0) {
      body += `<hr style="margin:12px 0;border:none;border-top:1px solid var(--gray-200)">`;
      body += `<div style="font-weight:600;font-size:0.8rem;margin-bottom:6px;color:var(--gray-700)">Enseignants impactes :</div>`;
      ccfEntry.impactedSlots.forEach((slot, idx) => {
        const statusIcon = slot.approval === 'accepted' ? '&#9989;' : slot.approval === 'refused' ? '&#10060;' : '&#9203;';
        const statusColor = slot.approval === 'accepted' ? '#28a745' : slot.approval === 'refused' ? '#dc3545' : '#ff9800';
        body += `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;margin:3px 0;background:var(--gray-100);border-radius:4px;font-size:0.8rem">
          <span>${slot.start}-${slot.end} <strong>${slot.subject}</strong></span>
          <span style="color:${statusColor};font-size:0.9rem">${statusIcon}</span>
        </div>`;

        // Boutons de validation pour cet enseignant specifique
        if (slot.approval === 'pending') {
          body += `<div style="display:flex;gap:6px;margin:4px 0 8px 8px">
            <button class="btn btn-success" style="font-size:0.7rem;padding:4px 10px" onclick="respondSlot('${ccfEntry.key}',${idx},'accepted')">Accepter</button>
            <button class="btn btn-danger" style="font-size:0.7rem;padding:4px 10px" onclick="respondSlot('${ccfEntry.key}',${idx},'refused')">Refuser</button>
          </div>`;
        }
      });
    } else {
      // Ancien format sans impactedSlots
      body += `<div class="info-row"><span class="label">Statut</span><span class="value">${getStatusLabel(ccfEntry.status)}</span></div>`;
      if (ccfEntry.status === 'pending') {
        body += `<div class="form-actions" style="margin-top:14px">
          <button class="btn btn-success" onclick="respondCCF('${ccfEntry.key}','accepted')">Accepter</button>
          <button class="btn btn-danger" onclick="respondCCF('${ccfEntry.key}','refused')">Refuser</button>
        </div>`;
      }
    }

    if (ccfEntry.comment) {
      body += `<div class="info-row" style="margin-top:8px"><span class="label">Commentaire</span><span class="value">${ccfEntry.comment}</span></div>`;
    }

    // CCF non modifiable une fois pose
  } else {
    // Pas de CCF : proposer d'en poser un
    body += `<div class="form-actions" style="margin-top:16px">
      <button class="btn btn-primary" onclick="openCCFForm('${classId}','${dateISO}','${start}','${end}',${dayIdx})">Poser un CCF ici</button>
      <button class="btn btn-outline" onclick="closeModal('modalSlot')">Fermer</button>
    </div>`;
  }

  document.getElementById('modalSlotBody').innerHTML = body;
  document.getElementById('modalTitle').textContent = `${course.subject} — ${classId}`;
  document.getElementById('modalSlot').classList.add('active');
}

function findCCFForSlot(classId, dateISO, start, end) {
  for (const [key, val] of Object.entries(ccfData)) {
    if (val.date === dateISO && val.status !== 'refused') {
      const classMatch = val.classId === classId || (val.classes && val.classes.includes(classId));
      if (!classMatch) continue;
      const ccfStart = timeToMin(val.ccfStart || val.slotStart);
      const ccfEnd = timeToMin(val.ccfEnd || val.slotEnd);
      const sMin = timeToMin(start);
      if (sMin >= ccfStart && sMin < ccfEnd) {
        return { ...val, key };
      }
    }
  }
  return null;
}

function getStatusLabel(status) {
  const labels = { pending: 'En attente', accepted: 'Accepte', refused: 'Refuse', own: 'CCF confirme' };
  return labels[status] || status;
}

// === FORMULAIRE CCF ===
function openCCFForm(classId, dateISO, start, end, dayIdx) {
  closeModal('modalSlot');
  document.getElementById('ccfSlotKey').value = `${classId}_${dateISO}_${start}_${end}`;
  document.getElementById('ccfDate').value = dateISO;
  document.getElementById('ccfClassId').value = classId;
  document.getElementById('ccfSlotStart').value = start;
  document.getElementById('ccfDayIdx').value = dayIdx;

  // Pre-cocher la classe
  document.querySelectorAll('#ccfClasses input').forEach(cb => {
    cb.checked = cb.value === classId;
  });

  // Reset duree et apercu
  document.getElementById('ccfDuration').value = '1';
  updateImpactPreview();

  document.getElementById('modalCCF').classList.add('active');
}

// Apercu dynamique des creneaux impactes
function updateImpactPreview() {
  const classId = document.getElementById('ccfClassId').value;
  const dateISO = document.getElementById('ccfDate').value;
  const startTime = document.getElementById('ccfSlotStart').value;
  const duration = parseFloat(document.getElementById('ccfDuration').value);
  const group = document.getElementById('ccfImpactGroup');
  const preview = document.getElementById('ccfImpactPreview');

  if (!classId || !dateISO || !startTime) {
    group.style.display = 'none';
    return;
  }

  const impacted = getImpactedSlots(classId, dateISO, startTime, duration);
  const ccfEnd = calcEndTime(startTime, duration);

  if (impacted.length === 0) {
    group.style.display = 'none';
    return;
  }

  group.style.display = 'block';
  let html = `<div style="font-weight:600;margin-bottom:6px;color:var(--primary)">CCF de ${startTime} a ${ccfEnd}</div>`;
  impacted.forEach(s => {
    html += `<div style="padding:4px 0;border-bottom:1px solid var(--gray-200)">
      &#8226; <strong>${s.start} - ${s.end}</strong> : ${s.subject}
    </div>`;
  });

  html += `<div style="margin-top:8px;font-size:0.75rem;color:var(--gray-600)">
    <strong>${impacted.length} creneau(x)</strong> impacte(s) par cette demande.
  </div>`;

  preview.innerHTML = html;
}

function submitCCF(e) {
  e.preventDefault();

  const classId = document.getElementById('ccfClassId').value;
  const dateISO = document.getElementById('ccfDate').value;
  const startTime = document.getElementById('ccfSlotStart').value;

  const teacher = document.getElementById('ccfTeacher').value;
  const subject = document.getElementById('ccfSubject').value;
  const duration = parseFloat(document.getElementById('ccfDuration').value);
  const students = document.getElementById('ccfStudents').value;
  const aesh = document.getElementById('ccfAesh').value;
  const comment = document.getElementById('ccfComment').value;

  const selectedClasses = [];
  document.querySelectorAll('#ccfClasses input:checked').forEach(cb => {
    selectedClasses.push(cb.value);
  });

  if (selectedClasses.length === 0) {
    showToast('Veuillez selectionner au moins une classe');
    return;
  }

  // Calculer fin du CCF et creneaux impactes
  const ccfEnd = calcEndTime(startTime, duration);
  const impacted = getImpactedSlots(classId, dateISO, startTime, duration);

  // Determiner si c'est son propre cours pour TOUS les creneaux
  const allOwnSlots = impacted.length > 0 && impacted.every(s =>
    s.teachers.includes(teacher)
  );

  // Mettre approval auto pour ses propres creneaux
  impacted.forEach(s => {
    if (s.teachers.includes(teacher)) {
      s.approval = 'accepted';
    }
  });

  const entry = {
    classId,
    date: dateISO,
    ccfStart: startTime,
    ccfEnd: ccfEnd,
    // Garder slotStart/slotEnd pour retro-compatibilite
    slotStart: startTime,
    slotEnd: ccfEnd,
    requestedBy: teacher,
    subject,
    classes: selectedClasses,
    duration,
    students: parseInt(students),
    aesh: parseInt(aesh),
    comment,
    impactedSlots: impacted,
    status: allOwnSlots ? 'own' : 'pending',
    createdAt: new Date().toISOString()
  };

  const newRef = ccfRef.push();
  newRef.set(entry).then(() => {
    closeModal('modalCCF');
    document.getElementById('ccfForm').reset();
    showToast(allOwnSlots ? 'CCF enregistre !' : 'Demande CCF envoyee !');
  }).catch(err => {
    showToast('Erreur: ' + err.message);
  });
}

// === REPONDRE A UNE DEMANDE ===
function respondCCF(key, status) {
  ccfRef.child(key).update({ status, respondedAt: new Date().toISOString() }).then(() => {
    closeModal('modalSlot');
    showToast(status === 'accepted' ? 'CCF accepte !' : 'CCF refuse.');
  });
}

// Repondre pour un creneau specifique (impactedSlots)
function respondSlot(key, slotIdx, approval) {
  const entry = ccfData[key];
  if (!entry || !entry.impactedSlots) return;

  // Mettre a jour l'approval du slot specifique
  const updates = {};
  updates[`impactedSlots/${slotIdx}/approval`] = approval;

  // Calculer le statut global
  const slots = [...entry.impactedSlots];
  slots[slotIdx] = { ...slots[slotIdx], approval };

  let globalStatus;
  if (slots.some(s => s.approval === 'refused')) {
    globalStatus = 'refused';
  } else if (slots.every(s => s.approval === 'accepted')) {
    globalStatus = 'accepted';
  } else {
    globalStatus = 'pending';
  }
  updates.status = globalStatus;
  updates.respondedAt = new Date().toISOString();

  ccfRef.child(key).update(updates).then(() => {
    closeModal('modalSlot');
    const msg = approval === 'accepted' ? 'Creneau accepte !' : 'Creneau refuse.';
    showToast(msg + (globalStatus === 'accepted' ? ' CCF confirme !' : globalStatus === 'refused' ? ' CCF refuse.' : ''));
  });
}

// === DEMANDES EN ATTENTE ===
function updatePendingCount() {
  const pending = Object.values(ccfData).filter(v => v.status === 'pending');
  const count = pending.length;
  const bar = document.getElementById('pendingBar');
  const countEl = document.getElementById('pendingCount');
  countEl.textContent = count;
  bar.classList.toggle('visible', count > 0);
}

function showRequests() {
  const panel = document.getElementById('requestsPanel');
  const isVisible = panel.classList.contains('visible');

  if (isVisible) {
    panel.classList.remove('visible');
    return;
  }

  let html = '<h2 style="font-size:1rem;margin-bottom:12px">Demandes CCF en attente</h2>';

  const pending = Object.entries(ccfData).filter(([k,v]) => v.status === 'pending');

  if (pending.length === 0) {
    html += '<p style="color:var(--gray-500);font-size:0.85rem">Aucune demande en attente.</p>';
  }

  pending.forEach(([key, val]) => {
    const date = new Date(val.date + 'T00:00:00');
    const ccfStart = val.ccfStart || val.slotStart;
    const ccfEnd = val.ccfEnd || val.slotEnd;
    let slotsHtml = '';
    if (val.impactedSlots) {
      val.impactedSlots.forEach((s, idx) => {
        const icon = s.approval === 'accepted' ? '&#9989;' : s.approval === 'refused' ? '&#10060;' : '&#9203;';
        slotsHtml += `<div style="padding:3px 0;font-size:0.8rem">${icon} ${s.start}-${s.end} ${s.subject}`;
        if (s.approval === 'pending') {
          slotsHtml += ` <button class="btn btn-success" style="font-size:0.65rem;padding:2px 6px;margin-left:4px" onclick="respondSlot('${key}',${idx},'accepted')">Accepter</button>`;
          slotsHtml += ` <button class="btn btn-danger" style="font-size:0.65rem;padding:2px 6px" onclick="respondSlot('${key}',${idx},'refused')">Refuser</button>`;
        }
        slotsHtml += `</div>`;
      });
    }
    html += `<div class="request-card">
      <div class="request-info">
        <strong>${val.requestedBy}</strong> souhaite poser un CCF de <strong>${val.subject}</strong><br>
        Le <strong>${formatDate(date)}</strong> de ${ccfStart} a ${ccfEnd} (${val.duration}h)<br>
        Classe(s): <strong>${(val.classes||[]).join(', ')}</strong> — ${val.students} eleves — ${val.aesh||0} AESH
        ${slotsHtml ? '<div style="margin-top:6px;border-top:1px solid var(--gray-200);padding-top:6px">' + slotsHtml + '</div>' : ''}
        ${val.comment ? '<br>Commentaire: ' + val.comment : ''}
      </div>
      ${!val.impactedSlots ? `<div class="request-actions">
        <button class="btn btn-success" onclick="respondCCF('${key}','accepted')">Accepter</button>
        <button class="btn btn-danger" onclick="respondCCF('${key}','refused')">Refuser</button>
      </div>` : ''}
    </div>`;
  });

  // Aussi afficher les demandes traitees recemment
  const treated = Object.entries(ccfData).filter(([k,v]) => v.status === 'accepted' || v.status === 'refused');
  if (treated.length > 0) {
    html += '<h3 style="font-size:0.9rem;margin:16px 0 8px;color:var(--gray-600)">Historique</h3>';
    treated.forEach(([key, val]) => {
      const date = new Date(val.date + 'T00:00:00');
      const cssClass = val.status === 'accepted' ? 'accepted' : 'refused';
      html += `<div class="request-card ${cssClass}">
        <div class="request-info">
          <strong>${val.requestedBy}</strong> — CCF ${val.subject}<br>
          ${formatDate(date)} ${val.slotStart}-${val.slotEnd} — ${(val.classes||[]).join(', ')}<br>
          Statut: <strong>${getStatusLabel(val.status)}</strong>
        </div>
      </div>`;
    });
  }

  panel.innerHTML = html;
  panel.classList.add('visible');
}

// === MODAL UTILS ===
function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

// Fermer modal au clic sur overlay
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) el.classList.remove('active');
  });
});

// === TOAST ===
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// === DEMARRER ===
init();
</script>
